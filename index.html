<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>get_info 日志转 PNG（单文件）</title>
  <style>
    :root {
      --bg: #0f1117;
      --bg2: #161b27;
      --card: #1e2536;
      --card2: #252d42;
      --text: #e2e8f0;
      --text-sub: #94a3b8;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --primary-glow: rgba(99,102,241,0.35);
      --ok: #34d399;
      --ok-glow: rgba(52,211,153,0.3);
      --warn: #fbbf24;
      --err: #f87171;
      --border: #2e3a52;
      --border-active: #6366f1;
      --drop-bg: #1a2133;
      --drop-bg-active: #1e2847;
      --radius: 14px;
      --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(99,102,241,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 90%, rgba(52,211,153,0.10) 0%, transparent 60%);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    /* ── 顶部标题区 ── */
    .hero {
      text-align: center;
      margin-bottom: 32px;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.4);
      border-radius: 99px;
      padding: 4px 14px;
      font-size: 12px;
      color: #a5b4fc;
      letter-spacing: .5px;
      margin-bottom: 14px;
    }
    .hero h1 {
      font-size: 30px;
      font-weight: 700;
      background: linear-gradient(135deg, #e2e8f0 30%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }
    .hero p {
      margin-top: 10px;
      color: var(--text-sub);
      font-size: 14px;
      line-height: 1.7;
    }

    /* ── 主卡片 ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.03) inset;
    }

    /* ── 拖放区 ── */
    .drop {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 24px;
      text-align: center;
      background: var(--drop-bg);
      transition: border-color .25s, background .25s, box-shadow .25s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .drop::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(99,102,241,0.07), transparent);
      opacity: 0;
      transition: opacity .25s;
    }
    .drop:hover, .drop.drag {
      border-color: var(--border-active);
      background: var(--drop-bg-active);
      box-shadow: 0 0 0 4px var(--primary-glow);
    }
    .drop:hover::before, .drop.drag::before { opacity: 1; }
    .drop-icon {
      font-size: 44px;
      margin-bottom: 10px;
      display: block;
      filter: drop-shadow(0 0 10px rgba(99,102,241,0.5));
      transition: transform .25s;
    }
    .drop:hover .drop-icon, .drop.drag .drop-icon { transform: translateY(-4px) scale(1.05); }
    .drop-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .drop-sub {
      font-size: 13px;
      color: var(--text-sub);
    }
    .drop.has-file .drop-icon { filter: drop-shadow(0 0 10px var(--ok-glow)); }
    .drop.has-file .drop-title { color: var(--ok); }

    /* ── DPI 控件 ── */
    .dpi-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
      padding: 14px 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .dpi-row label {
      font-size: 13px;
      color: var(--text-sub);
      white-space: nowrap;
    }
    .dpi-row input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: linear-gradient(to right, var(--primary), var(--primary)) no-repeat center;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    .dpi-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 8px var(--primary-glow);
      cursor: pointer;
      transition: transform .15s;
    }
    .dpi-row input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    .dpi-val {
      font-size: 13px;
      font-weight: 700;
      color: #a5b4fc;
      min-width: 34px;
      text-align: right;
    }

    /* ── 按钮组 ── */
    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: none;
      border-radius: var(--radius-sm);
      padding: 11px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, box-shadow .2s, transform .1s;
      font-family: inherit;
    }
    .btn:active:not(:disabled) { transform: scale(0.97); }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      box-shadow: 0 4px 14px rgba(99,102,241,0.4);
    }
    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(135deg, #818cf8, #6366f1);
      box-shadow: 0 6px 20px rgba(99,102,241,0.55);
    }
    .btn-primary:disabled {
      background: linear-gradient(135deg, #374151, #2d3748);
      color: #4b5563;
      box-shadow: none;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: var(--card2);
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .btn-secondary:hover:not(:disabled) {
      background: #2e3a52;
      border-color: #4b5563;
    }
    .btn-secondary:disabled {
      color: #374151;
      border-color: #1f2937;
      cursor: not-allowed;
    }

    /* ── 进度条 ── */
    .progress-wrap {
      margin-top: 16px;
      display: none;
    }
    .progress-wrap.show { display: block; }
    .progress-bar-bg {
      background: var(--bg2);
      border-radius: 99px;
      height: 4px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #6366f1, #a5b4fc, #6366f1);
      background-size: 200% 100%;
      animation: shimmer 1.5s linear infinite;
      width: 100%;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── 状态栏 ── */
    #status {
      margin-top: 14px;
      font-size: 13px;
      color: var(--text-sub);
      white-space: pre-wrap;
      display: flex;
      align-items: flex-start;
      gap: 7px;
      line-height: 1.6;
      min-height: 22px;
    }
    #status .s-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-sub);
      flex-shrink: 0;
      margin-top: 5px;
    }
    #status.loading .s-dot {
      background: var(--primary);
      animation: pulse-dot 1s ease-in-out infinite;
    }
    #status.ok-state .s-dot { background: var(--ok); }
    #status.ok-state { color: var(--ok); }
    #status.err-state .s-dot { background: var(--err); }
    #status.err-state { color: var(--err); }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .4; transform: scale(.6); }
    }

    /* ── 预览区 ── */
    .preview-wrap {
      margin-top: 22px;
      display: none;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      background: #fff;
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    .preview-wrap.show { display: block; animation: fade-in .35s ease; }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .preview-wrap img {
      width: 100%;
      display: block;
    }

    /* ── 页脚 ── */
    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: #374151;
    }
  </style>
</head>
<body>
  <div class="wrap">

    </div>

    <div class="footer">单文件 HTML · 无需联网（除首次加载 Pyodide）· 数据不离开本地浏览器</div>
  </div>

    const statusEl    = document.getElementById("status");
    const statusText  = document.getElementById("statusText");
    const dropEl      = document.getElementById("drop");
    const dropTitle   = document.getElementById("dropTitle");
    const fileInput   = document.getElementById("fileInput");
    const runBtn      = document.getElementById("runBtn");
    const saveBtn     = document.getElementById("saveBtn");
    const previewEl   = document.getElementById("preview");
    const previewWrap = document.getElementById("previewWrap");
    const progressWrap= document.getElementById("progressWrap");
    const dpiRange    = document.getElementById("dpiRange");
    const dpiVal      = document.getElementById("dpiVal");

    dpiRange.addEventListener("input", () => { dpiVal.textContent = dpiRange.value; });

    let pyodide = null;
    let selectedFile = null;
    let pngBytes = null;

    const setStatus = (msg, mode = "idle") => {
      // mode: idle | loading | ok | err
      statusText.textContent = msg;
      statusEl.className = mode === "ok" ? "ok-state" : mode === "err" ? "err-state" : mode === "loading" ? "loading" : "";
      progressWrap.className = "progress-wrap" + (mode === "loading" ? " show" : "");
    };

    async function initPyodideIfNeeded() {
      if (pyodide) return;
      setStatus("正在加载 Python 运行环境（首次需几十秒）...", "loading");
      pyodide = await loadPyodide();
      await pyodide.loadPackage(["matplotlib", "pyyaml"]);
      setStatus("Python 环境加载完成。", "idle");
    }

    async function runConvert(logText, dpi) {
      const code = `
import base64
from io import BytesIO
from decimal import Decimal, getcontext
import copy
import yaml
import matplotlib
matplotlib.use("Agg")
import matplotlib.pyplot as plt
import matplotlib.colors as mcolors
from matplotlib.ticker import AutoLocator, ScalarFormatter, MaxNLocator

getcontext().prec = 50
colors = list(mcolors.TABLEAU_COLORS.keys())

def plan_square_frame(num_squares):
    if num_squares == 0:
        num_squares = 1
    cols = int(num_squares ** 0.5)
    rows = (num_squares + cols - 1) // cols
    return cols, rows

def convert(log_text, config_yaml, dpi):
    configs = yaml.safe_load(config_yaml)
    if configs is None:
        raise Exception("配置为空")
    configs = copy.deepcopy(configs)

    boot_time_data = []
    boot_ost_time_data = []
    reboot_flag = []
    infos_data = {"": []}
    basic_time = 0
    warning_info = "Cannot find data: "

    for i, _ in enumerate(configs["info"]):
        configs["info"][i]["has_data"] = False

    for line in log_text.splitlines():
        if "BOOT_TIME(s)" in line:
            try:
                ost_time = int(line.split("|")[-2].split(".")[0]) / 60
            except Exception:
                continue
            if len(boot_time_data) > 0 and ost_time < boot_ost_time_data[-1]:
                basic_time = boot_time_data[-1]
                reboot_flag.append(basic_time)
            curr_time = ost_time + basic_time
            boot_ost_time_data.append(ost_time)
            boot_time_data.append(curr_time)

        for index in range(len(configs["info"]) - 1, -1, -1):
            item = configs["info"][index]
            if item["info_name"] in line:
                if infos_data.get(item["name"]) is None:
                    infos_data[item["name"]] = []
                try:
                    item_data = line.split("|")[-2].split(" ")[item["sampling_index"][0]].split(",")[item["sampling_index"][1]]
                except Exception:
                    item_data = ""
                if item_data == "":
                    warning_info += (item["name"] + " ")
                    del configs["info"][index]
                    continue
                data = Decimal(item_data)
                if item.get("max") is not None:
                    data = min(data, item["max"])
                if item.get("min") is not None:
                    data = max(data, item["min"])
                infos_data[item["name"]].append(data)
                item["has_data"] = True

    for index in range(len(configs["info"]) - 1, -1, -1):
        if configs["info"][index]["has_data"] is False:
            warning_info += (configs["info"][index]["name"] + " ")
            del configs["info"][index]

    if len(boot_time_data) <= 0:
        raise Exception("BOOT TIME is Empty")

    basic_time = boot_time_data[0]
    boot_time_data = [x - basic_time for x in boot_time_data]
    reboot_flag = [x - basic_time for x in reboot_flag]

    cols, rows = plan_square_frame(len(configs["info"]))
    plt.style.use("fast")
    fig, axs = plt.subplots(rows, cols, figsize=(rows * 8, cols * 8))

    def get_ax(i, j):
        if cols > 1:
            return axs[i, j]
        return axs[i]

    for j in range(cols):
        for i in range(rows):
            idx = j * rows + i
            if idx >= len(configs["info"]):
                break
            item = configs["info"][idx]
            ax = get_ax(i, j)
            data_temp = infos_data[item["name"]]

            if len(data_temp) < len(boot_time_data):
                for _ in range(0, len(boot_time_data) - len(data_temp)):
                    d = data_temp[-1]
                    if item.get("max") is not None:
                        d = min(d, item["max"])
                    if item.get("min") is not None:
                        d = max(d, item["min"])
                    data_temp.append(d)

            ax.set_xlim(left=boot_time_data[0], right=boot_time_data[-1])
            ax.scatter(boot_time_data, data_temp, s=configs["point_size"], color="red", label=item["y_name"])
            if item.get("min") is not None:
                ax.set_ylim(bottom=item.get("min"))
            if item.get("max") is not None:
                ax.set_ylim(top=item.get("max"))

            ax.xaxis.set_major_locator(AutoLocator())
            ax.xaxis.set_major_formatter(ScalarFormatter(useOffset=False))
            ax.yaxis.set_major_locator(AutoLocator())
            ax.yaxis.set_major_formatter(ScalarFormatter(useOffset=False))

            reboot_label_flag = 0
            for rf in reboot_flag:
                if reboot_label_flag == 0:
                    ax.axvline(x=rf, color="green", linestyle="--", linewidth=1, label="reboot flag")
                    reboot_label_flag = 1
                else:
                    ax.axvline(x=rf, color="green", linestyle="--", linewidth=1)

            if item.get("y_flag") is not None:
                y_flag_count = 0
                for v in item.get("y_flag"):
                    ax.axhline(
                        y=v,
                        color=mcolors.TABLEAU_COLORS[colors[y_flag_count]],
                        alpha=0.3,
                        linewidth=3,
                        label=f"{float(v):.1f}"
                    )
                    y_flag_count += 1

            ax.spines["top"].set_visible(False)
            ax.spines["bottom"].set_visible(False)
            ax.spines["right"].set_visible(False)
            ax.set_ylabel(item["y_name"])
            ax.set_title(item["y_name"])
            ax.set_xlabel("TIME(min)")
            ax.legend(loc="upper left", bbox_to_anchor=(1, 1))
            ax.yaxis.set_major_locator(MaxNLocator(50))
            ax.autoscale_view()
            ax.grid(True, alpha=0.5)

    fig.text(0.01, 0.00, warning_info, ha="left", va="bottom", fontsize=10, color="red")
    fig.tight_layout()
    buf = BytesIO()
    fig.savefig(buf, dpi=dpi, transparent=False, format="png")
    plt.close(fig)
    return base64.b64encode(buf.getvalue()).decode("ascii"), warning_info
`;
      pyodide.runPython(code);
      pyodide.globals.set("LOG_TEXT_JS", logText);
      pyodide.globals.set("CFG_YAML_JS", CONFIG_YAML);
      pyodide.globals.set("DPI_JS", dpi);
      const pyRes = pyodide.runPython("convert(LOG_TEXT_JS, CFG_YAML_JS, DPI_JS)");
      return pyRes.toJs();
    }

    function setSelectedFile(file) {
      if (!file) return;
      if (!file.name.toLowerCase().endsWith(".log")) {
        setStatus("只支持 .log 文件", "err");
        return;
      }
      selectedFile = file;
      runBtn.disabled = false;
      dropEl.classList.add("has-file");
      dropTitle.textContent = `✅ ${file.name}`;
      setStatus(`已选择：${file.name}（${(file.size/1024).toFixed(1)} KB）`, "idle");
    }

    dropEl.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", (e) => setSelectedFile(e.target.files?.[0]));

    ["dragenter", "dragover"].forEach((ev) => {
      dropEl.addEventListener(ev, (e) => {
        e.preventDefault();
        dropEl.classList.add("drag");
      });
    });
    ["dragleave", "drop"].forEach((ev) => {
      dropEl.addEventListener(ev, (e) => {
        e.preventDefault();
        dropEl.classList.remove("drag");
      });
    });
    dropEl.addEventListener("drop", (e) => setSelectedFile(e.dataTransfer?.files?.[0]));

    runBtn.addEventListener("click", async () => {
      if (!selectedFile) return;
      runBtn.disabled = true;
      saveBtn.disabled = true;
      previewWrap.classList.remove("show");
      setStatus("正在读取日志...", "loading");
      try {
        const dpi = parseInt(dpiRange.value, 10);
        const logText = await selectedFile.text();
        await initPyodideIfNeeded();
        setStatus("正在解析并绘图，日志较大时会稍慢...", "loading");
        const [base64Png, warningInfo] = await runConvert(logText, dpi);
        const bin = atob(base64Png);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i += 1) bytes[i] = bin.charCodeAt(i);
        pngBytes = bytes;

        const blob = new Blob([bytes], { type: "image/png" });
        const url = URL.createObjectURL(blob);
        previewEl.src = url;
        previewWrap.classList.add("show");
        saveBtn.disabled = false;
        setStatus(`生成成功（DPI=${dpi}）。${warningInfo || ""}`, "ok");
      } catch (err) {
        setStatus(`失败：${err.message || err}`, "err");
      } finally {
        runBtn.disabled = false;
      }
    });

    saveBtn.addEventListener("click", () => {
      if (!pngBytes || !selectedFile) return;
      const name = selectedFile.name.replace(/\.log$/i, "") + ".png";
      const blob = new Blob([pngBytes], { type: "image/png" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = name;
      a.click();
      URL.revokeObjectURL(a.href);
    });
  </script>
